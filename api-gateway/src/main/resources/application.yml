server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: case-service
          uri: http://${CASE_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/cases/**
        - id: people-service
          uri: http://${PEOPLE_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/people/**
        - id: evidence-service
          uri: http://${EVIDENCE_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/evidences/**
        - id: task-service
          uri: http://${TASK_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/tasks/**

  security:
    oauth2:
      resourceserver:
        jwt:
          # Gateway fetch keys from Keycloak internally
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8090}/realms/carinosas/protocol/openid-connect/certs

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG