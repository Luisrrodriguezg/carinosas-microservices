services:
  postgres:
    image: postgres:15-alpine
    container_name: carinosas-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - carinosas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: carinosas-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8090
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8090:8090"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - carinosas-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8090 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  case-service:
    build:
      context: ./case-service
      dockerfile: Dockerfile
    container_name: carinosas-case-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: carinosas_case_db
    ports:
      - "8081:8081"
    networks:
      - carinosas-network

  people-service:
    build:
      context: ./people-service
      dockerfile: Dockerfile
    container_name: carinosas-people-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: carinosas_people_db
    ports:
      - "8082:8082"
    networks:
      - carinosas-network

  evidence-service:
    build:
      context: ./evidence-service
      dockerfile: Dockerfile
    container_name: carinosas-evidence-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: carinosas_evidence_db
    ports:
      - "8083:8083"
    networks:
      - carinosas-network

  task-service:
    build:
      context: ./task-service
      dockerfile: Dockerfile
    container_name: carinosas-task-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: carinosas_task_db
    ports:
      - "8084:8084"
    networks:
      - carinosas-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: carinosas-api-gateway
    depends_on:
      keycloak:
        condition: service_healthy
      case-service:
        condition: service_started
      people-service:
        condition: service_started
      evidence-service:
        condition: service_started
      task-service:
        condition: service_started
    environment:
      CASE_SERVICE_HOST: case-service
      PEOPLE_SERVICE_HOST: people-service
      EVIDENCE_SERVICE_HOST: evidence-service
      TASK_SERVICE_HOST: task-service
      KEYCLOAK_URL: http://keycloak:8090
    ports:
      - "8080:8080"
    networks:
      - carinosas-network

volumes:
  postgres_data:

networks:
  carinosas-network:
    driver: bridge